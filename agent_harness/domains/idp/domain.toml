[domain]
id = "idp"
name = "Intelligent Document Processing"
version = "1.0.0"

[domain.models]
# Logical roles — resolved at deployment time via provider config
# Do not put model strings here. Use role names only.
investigator = "capable"     # Complex reasoning, document analysis
orchestrator = "capable"     # Planning + QA
executor = "fast"            # Tool calls, structured output
synthesizer = "fast"         # Final assembly

[domain.mcp]
server_module = "agent_harness.domains.idp.mcp_server"
server_port = 8002

[domain.temporal]
task_queue = "idp-operativo"
workflow_id_prefix = "idp"

[domain.memory]
collection = "idp_domain"

[domain.injection_guard]
semantic_check = true
semantic_threshold = 0.7

[domain.limits]
max_correction_attempts = 3
compaction_threshold = 0.75
